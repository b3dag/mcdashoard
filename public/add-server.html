<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>add server - minecraft dashboard</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .advanced-toggle {
      cursor: pointer;
      user-select: none;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 0.5rem 0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .advanced-toggle .arrow { transition: transform 0.15s; font-size: 0.7rem; }
    .advanced-toggle.open .arrow { transform: rotate(90deg); }
    .advanced-body { display: none; }
    .advanced-body.open { display: block; }

    .progress-box {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(255,255,255,0.02);
      font-family: monospace;
      font-size: 0.9rem;
      display: none;
    }
    .progress-box.show { display: block; }
    .progress-box .step { color: var(--muted); font-size: 0.8rem; }
    .progress-box .msg  { font-size: 1rem; margin-top: 0.2rem; }
    .progress-box.error { border-color: #c84040; }
    .progress-box.done  { border-color: #4caf50; }
  </style>
</head>
<body>
  <main id="main">
    <h1>add new server</h1>
    <p class="muted">provision a new minecraft instance on the system.</p>

    <form class="form mt-2" id="add-server-form" style="max-width: 500px;">
      <div class="form-group">
        <label for="name">server id (lowercase, no spaces)</label>
        <input type="text" id="name" placeholder="e.g. survival-01" required />
      </div>
      <div class="form-group">
        <label for="display">display name</label>
        <input type="text" id="display" placeholder="e.g. My Survival World" required />
      </div>
      <div class="form-group">
        <label for="type">server type</label>
        <select id="type">
          <option value="1">Vanilla (Official)</option>
          <option value="2">Fabric (Modded)</option>
          <option value="3">Paper (Performance)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="version">minecraft version</label>
        <input type="text" id="version" value="1.21.1" required />
      </div>

      <div class="advanced-toggle" id="advanced-toggle">
        <span class="arrow">▶</span> advanced options
      </div>
      <div class="advanced-body" id="advanced-body">
        <p class="muted" style="font-size: 0.85rem; margin-bottom: 0.5rem;">
          leave blank to auto-pick. RCON port is always the game port + 1000.
        </p>
        <div class="form-group">
          <label for="port">game port</label>
          <input type="number" id="port" placeholder="auto (e.g. 25565 → rcon 26565)" />
        </div>
        <div class="row">
          <div class="form-group" style="flex: 1;">
            <label for="ramMax">max ram</label>
            <input type="text" id="ramMax" value="4G" />
          </div>
          <div class="form-group" style="flex: 1;">
            <label for="ramMin">min ram</label>
            <input type="text" id="ramMin" value="2G" />
          </div>
        </div>
      </div>

      <button type="submit" class="btn primary" id="submit-btn">create server</button>
      <p class="form-status" id="status"></p>
    </form>

    <div class="progress-box" id="progress-box">
      <div class="step" id="progress-step">starting...</div>
      <div class="msg" id="progress-msg">queued</div>
    </div>
  </main>

  <script type="module">
    import { api, renderHeader, renderFooter, el } from '/app.js';

    const me = await renderHeader('add-server');
    if (!me || !me.is_super) {
      document.getElementById('main').innerHTML = '<h1>no access</h1><p class="muted">super-operator only.</p>';
      throw new Error();
    }
    renderFooter();

    /* ---- advanced toggle ---- */
    const advToggle = document.getElementById('advanced-toggle');
    const advBody   = document.getElementById('advanced-body');
    advToggle.addEventListener('click', () => {
      advToggle.classList.toggle('open');
      advBody.classList.toggle('open');
    });

    /* ---- form submit ---- */
    const form    = document.getElementById('add-server-form');
    const status  = document.getElementById('status');
    const btn     = document.getElementById('submit-btn');
    const progBox = document.getElementById('progress-box');
    const progStep = document.getElementById('progress-step');
    const progMsg  = document.getElementById('progress-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      if (!/^[a-z0-9-]+$/.test(name)) {
        status.textContent = 'server id must be lowercase letters, digits, hyphens only';
        status.className = 'form-status error';
        return;
      }

      btn.disabled = true;
      status.textContent = '';
      progBox.className = 'progress-box show';
      progStep.textContent = 'starting...';
      progMsg.textContent  = 'queued';

      const body = {
        name,
        display: document.getElementById('display').value.trim(),
        type:    document.getElementById('type').value,
        version: document.getElementById('version').value.trim(),
        port:    parseInt(document.getElementById('port').value, 10) || 0,
        ramMax:  document.getElementById('ramMax').value.trim() || '4G',
        ramMin:  document.getElementById('ramMin').value.trim() || '2G',
      };

      try {
        await api('/api/servers/create', { method: 'POST', body });
      } catch (err) {
        progBox.className = 'progress-box show error';
        progStep.textContent = 'failed';
        progMsg.textContent  = err.message;
        btn.disabled = false;
        return;
      }

      /* poll status every 2 seconds */
      const pollInterval = setInterval(async () => {
        try {
          const s = await api('/api/servers/create/status?name=' + encodeURIComponent(name));
          progStep.textContent = s.step;
          progMsg.textContent  = s.message;

          if (s.done) {
            clearInterval(pollInterval);
            if (s.error) {
              progBox.className = 'progress-box show error';
              btn.disabled = false;
            } else {
              progBox.className = 'progress-box show done';
              progStep.textContent = 'done';
              progMsg.textContent  = (s.message || 'server ready') + ' — redirecting...';
              setTimeout(() => { location.href = '/index.html'; }, 2000);
            }
          }
        } catch (err) {
          /* status endpoint might 404 briefly between status writes — keep polling */
        }
      }, 2000);
    });
  </script>
</body>
</html>
